name: Build And Upload Extension Zip Via Artifact

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    env:
      # Placeholder values so buildManifest validation passes in CI.
      # Replace with repo secrets (vars.VITE_FIREBASE_*) once the auth broker
      # ships end-to-end and real Firebase / OAuth credentials are needed for
      # functional CI artifacts.
      VITE_FIREBASE_API_KEY: ci-placeholder-api-key
      VITE_FIREBASE_AUTH_DOMAIN: ci-placeholder.firebaseapp.com
      VITE_FIREBASE_PROJECT_ID: ci-placeholder-project
      VITE_FIREBASE_APP_ID: ci-placeholder-app-id
      VITE_GOOGLE_OAUTH_CLIENT_ID: ci-placeholder.apps.googleusercontent.com

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'
          cache: 'npm'

      - uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ runner.OS }}-build-${{ hashFiles('**/package-lock.json') }}

      - run: npm ci

      - run: npm run build:release

      - run: npm test

      - uses: actions/upload-artifact@v4
        with:
          path: dist/*
