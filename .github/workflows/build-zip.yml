name: Build And Upload Extension Zip Via Artifact

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    env:
      # Sourced from repo Variables (Settings → Secrets and variables → Actions
      # → Variables). These are Firebase web config + the OAuth client_id —
      # all public values that already ship to every browser running the
      # extension, so they live in Variables (not Secrets).
      VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID }}
      VITE_GOOGLE_OAUTH_WEB_CLIENT_ID: ${{ vars.VITE_GOOGLE_OAUTH_WEB_CLIENT_ID }}

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'
          cache: 'npm'

      - uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ runner.OS }}-build-${{ hashFiles('**/package-lock.json') }}

      - run: npm ci

      - run: npm run build:release

      - run: npm test

      - uses: actions/upload-artifact@v4
        with:
          path: dist/*
